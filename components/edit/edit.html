<div class="modal-overlay" id="edit-modal" role="dialog" aria-modal="true" aria-labelledby="modal-heading">

  <div class="modal-card">

    <div class="modal-header">
      <h2 id="modal-heading">Edit Task</h2>
      <button class="modal-close-btn" id="modal-close" aria-label="Close edit modal">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
          <path d="M1 1l12 12M13 1L1 13" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
      </button>
    </div>

    <form data-testid="test-todo-edit-form" class="modal-form" id="edit-form" novalidate>

      <div class="form-group">
        <label for="edit-title">Title</label>
        <input
          data-testid="test-todo-edit-title-input"
          id="edit-title"
          type="text"
          placeholder="Task title"
        />
      </div>

      <div class="form-group">
        <label for="edit-desc">Description</label>
        <textarea
          data-testid="test-todo-edit-description-input"
          id="edit-desc"
          placeholder="What needs to be done?"
          rows="3"
        ></textarea>
      </div>

      <div class="form-row">

        <div class="form-group">
          <label for="edit-priority">Priority</label>
          <select data-testid="test-todo-edit-priority-select" id="edit-priority">
            <option value="High">High</option>
            <option value="Medium">Medium</option>
            <option value="Low">Low</option>
          </select>
        </div>

        <div class="form-group">
          <label for="edit-due">Due Date</label>
          <input
            data-testid="test-todo-edit-due-date-input"
            id="edit-due"
            type="date"
          />
        </div>

      </div>

      <div class="modal-actions">
        <button type="button" data-testid="test-todo-cancel-button" id="btn-cancel" class="modal-btn-cancel">
          Cancel
        </button>
        <button type="button" data-testid="test-todo-save-button" id="btn-save" class="modal-btn-save">
          Save changes
        </button>
      </div>

    </form>
  </div>
</div>
