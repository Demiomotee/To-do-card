<div class="modal-overlay" id="edit-modal">

  <div class="modal-card" role="dialog" aria-modal="true">
    
    <!-- HEADER -->
    <div class="modal-header">
      <h2>Edit Task</h2>
      <button class="modal-close" id="modal-close">✕</button>
    </div>

    <!-- FORM -->
    <form data-testid="test-todo-edit-form" class="edit-form">

      <!-- TITLE -->
      <label for="edit-title">Title</label>
      <input id="edit-title"
             data-testid="test-todo-edit-title-input"
             type="text" />

      <!-- DESCRIPTION -->
      <label for="edit-desc">Description</label>
      <textarea id="edit-desc"
        data-testid="test-todo-edit-description-input"></textarea>

      <!-- TASKS -->
      <div class="tasks-section">
        <p class="section-label">Tasks</p>
        <div id="task-list"></div>

        <button type="button" id="add-task" class="btn-add-task">
          + Add task
        </button>
      </div>

      <!-- ROW -->
      <div class="edit-row">


        <div class="field full">
          <label for="edit-priority">Priority</label>
        
          <select id="edit-priority"
            data-testid="test-todo-edit-priority-select"
            class="select-clean full-width">
        
            <option value="Low">Low Priority</option>
            <option value="Medium">Medium Priority</option>
            <option value="High">High Priority</option>
        
          </select>
        </div>

        
        <!-- STATUS -->
        <!--
        <div class="field">
          <label>Status</label>
          <select data-testid="test-todo-status-control"
            id="edit-status"
            class="select-pill">
            <option>Pending</option>
            <option>In Progress</option>
            <option>Done</option>
          </select>
        </div> 
        -->

      </div>

      <!-- DATE -->
      <label for="edit-due">Due Date</label>
      <div class="date-wrap">
        <input id="edit-due"
          data-testid="test-todo-edit-due-date-input"
          type="datetime-local" />
      </div>

      <!-- ACTIONS -->
      <div class="edit-actions">
        <button type="button"
          data-testid="test-todo-cancel-button"
          class="btn-edit ghost">
          Cancel
        </button>

        <button type="button"
          data-testid="test-todo-save-button"
          class="btn-edit primary">
          Save
        </button>
      </div>

    </form>
  </div>
</div>
