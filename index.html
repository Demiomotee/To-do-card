<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todo Card</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <article data-testid="test-todo-card" id="todo-card" aria-labelledby="todo-title">

    <div class="card-header">
      <label class="checkbox-label">
        <input
          type="checkbox"
          id="todo-complete"
          data-testid="test-todo-complete-toggle"
          aria-label="Mark task as complete"
        />
        <span class="checkmark" aria-hidden="true"></span>
      </label>

      <h2 id="todo-title" data-testid="test-todo-title">
        Redesign onboarding flow for mobile
      </h2>

      <span data-testid="test-todo-priority" class="badge priority-high" aria-label="Priority: High">
        High
      </span>
    </div>

    <p data-testid="test-todo-description">
      Review the current onboarding steps, reduce friction, and hand off
      updated Figma screens to the dev team by end of sprint.
    </p>

    <div class="meta">
      <time data-testid="test-todo-due-date" datetime="2026-04-18T17:00:00Z">
        Due Apr 18, 2026
      </time>
      <span
        data-testid="test-todo-time-remaining"
        id="time-remaining"
        aria-live="polite"
        class="time-chip"
      >
        --
      </span>
    </div>

    <div class="status-row">
      <span class="label-text">Status</span>
      <span data-testid="test-todo-status" id="todo-status" class="badge status-progress" aria-label="Status: In Progress">
        In Progress
      </span>
    </div>

    <ul data-testid="test-todo-tags" aria-label="Task tags" role="list" class="tags">
      <li data-testid="test-todo-tag-work">work</li>
      <li data-testid="test-todo-tag-urgent">urgent</li>
      <li>design</li>
    </ul>

    <div class="actions">
      <button data-testid="test-todo-edit-button" aria-label="Edit task" onclick="console.log('edit clicked')">
        Edit
      </button>
      <button data-testid="test-todo-delete-button" class="delete-btn" aria-label="Delete task" onclick="alert('Delete clicked')">
        Delete
      </button>
    </div>

  </article>

  <script src="app.js"></script>
</body>
</html>
