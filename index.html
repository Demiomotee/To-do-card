<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todo Card</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark mode">
    <svg id="icon-moon" width="14" height="14" viewBox="0 0 24 24" fill="none" aria-hidden="true">
      <path d="M21 12.79A9 9 0 1111.21 3a7 7 0 109.79 9.79z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <svg id="icon-sun" width="14" height="14" viewBox="0 0 24 24" fill="none" aria-hidden="true" style="display:none">
      <circle cx="12" cy="12" r="5" stroke="currentColor" stroke-width="2"/>
      <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    </svg>
    <span id="toggle-label">Dark</span>
  </button>

  <article data-testid="test-todo-card" id="todo-card" aria-labelledby="todo-title">


    <div class="left-panel">
      <div class="date-block">
        <div class="date-top-row">
          <span id="live-day-number" class="day-number">11</span>
          <span id="live-day-month" class="day-month">April</span>
        </div>
        <span id="live-day-name" class="day-name">Saturday</span>
      </div>
      <hr class="left-divider" />
      <div class="todo-count">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <rect x="1" y="1" width="14" height="14" rx="3" stroke="currentColor" stroke-width="1.5"/>
          <path d="M4.5 8l2.5 2.5 4.5-4.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span id="todo-count-label">2 To-dos</span>
      </div>
    </div>

    
    <div class="right-panel">

      <div class="card-top">
        <h2 id="todo-title" data-testid="test-todo-title">Redesign Onboarding Flow</h2>
        <div class="badges">
          <span data-testid="test-todo-priority" class="badge priority-high" aria-label="Priority: High">High</span>
          <span data-testid="test-todo-status" id="todo-status" class="badge status-pending" aria-label="Status: Pending">Pending</span>
        </div>
      </div>

      <p data-testid="test-todo-description" class="desc">
        Review the current onboarding steps, reduce friction, and hand off
        updated Figma screens to the dev team by end of sprint.
      </p>

      <div class="meta-row">
        <svg width="12" height="12" viewBox="0 0 16 16" fill="none" aria-hidden="true" class="meta-icon">
          <rect x="1" y="3" width="14" height="12" rx="2" stroke="currentColor" stroke-width="1.5"/>
          <path d="M5 1v3M11 1v3M1 7h14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <time data-testid="test-todo-due-date" datetime="2026-04-18T17:00:00Z">Due Apr 18, 2026</time>
        <span data-testid="test-todo-time-remaining" id="time-remaining" aria-live="polite" class="time-chip time-future">--</span>
      </div>

      <hr class="section-divider" />
      <p class="section-label">To-dos</p>

      <label class="todo-row">
        <input type="checkbox" class="task-checkbox" data-testid="test-todo-complete-toggle" aria-label="Redesign onboarding flow for mobile" />
        <span class="custom-check" aria-hidden="true">
          <svg class="check-icon" width="10" height="10" viewBox="0 0 10 10" fill="none">
            <path d="M1.5 5l2.5 2.5 4.5-4.5" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </span>
        <span class="todo-text">Redesign onboarding flow for mobile</span>
      </label>

      <label class="todo-row">
        <input type="checkbox" class="task-checkbox" aria-label="Write handoff notes for dev team" />
        <span class="custom-check" aria-hidden="true">
          <svg class="check-icon" width="10" height="10" viewBox="0 0 10 10" fill="none">
            <path d="M1.5 5l2.5 2.5 4.5-4.5" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </span>
        <span class="todo-text">Write handoff notes for dev team</span>
      </label>

      <div class="card-footer">

        <ul data-testid="test-todo-tags" aria-label="Task tags" role="list" class="tags">
          <li data-testid="test-todo-tag-work">work</li>
          <li data-testid="test-todo-tag-urgent">urgent</li>
          <li>design</li>
        </ul>

        <div class="footer-btns">
          <button data-testid="test-todo-edit-button" id="btn-edit" class="btn-edit" aria-label="Edit task">
            <svg width="12" height="12" viewBox="0 0 16 16" fill="none" aria-hidden="true">
              <path d="M11.5 1.5l3 3-9 9H2.5v-3l9-9z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
              <path d="M9.5 3.5l3 3" stroke="currentColor" stroke-width="1.5"/>
            </svg>
            Edit
          </button>
          <button data-testid="test-todo-delete-button" id="btn-delete" class="btn-delete" aria-label="Delete task">
            <svg width="12" height="12" viewBox="0 0 16 16" fill="none" aria-hidden="true">
              <path d="M2 4h12M6 4V2h4v2M5 4v9a1 1 0 001 1h4a1 1 0 001-1V4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            Delete
          </button>
        </div>

      </div>
    </div>
  </article>


  <div id="alert-banner" class="alert-banner" role="alert" aria-live="polite">
    <span id="alert-msg"></span>
    <button id="alert-close" aria-label="Close alert">
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none" aria-hidden="true">
        <path d="M1 1l10 10M11 1L1 11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </button>
  </div>

  <script src="app.js"></script>
</body>
</html>
